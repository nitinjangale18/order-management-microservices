spring.application.name=API-GATEWAY

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webflux.routes[0].id=order-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/orders/**




spring.cloud.gateway.server.webflux.routes[0].filters[0].name=Retry
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.retries=3
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.methods=GET

spring.cloud.gateway.server.webflux.routes[0].filters[0].args.statuses=BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
spring.cloud.gateway.server.webflux.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.name=orderCircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.fallbackUri=forward:/fallback/order




spring.cloud.gateway.server.webflux.routes[1].id=inventory-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/inventory/**

spring.cloud.gateway.server.webflux.routes[1].filters[0].name=Retry
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.retries=3
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.methods=GET
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.statuses=BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
spring.cloud.gateway.server.webflux.routes[1].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[1].filters[1].args.name=inventoryCircuitBreaker
spring.cloud.gateway.server.webflux.routes[1].filters[1].args.fallbackUri=forward:/fallback/inventory
